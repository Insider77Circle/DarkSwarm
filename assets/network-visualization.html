<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkSwarm Network Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a0033 50%, #0d0015 100%);
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse"><path d="M 50 0 L 0 0 0 50" fill="none" stroke="%23222244" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="rgb(10,14,39)"/><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            background-size: 50px 50px;
        }

        #stats {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff88;
            font-size: 12px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            background: rgba(0, 20, 40, 0.7);
            padding: 15px;
            border: 1px solid #00ff88;
            border-radius: 4px;
            z-index: 10;
        }

        .stat-line {
            margin: 5px 0;
            font-family: 'Courier New', monospace;
        }

        .label {
            color: #00ccff;
            display: inline-block;
            width: 150px;
        }

        .value {
            color: #00ff88;
            font-weight: bold;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #00ff88;
            font-size: 11px;
            background: rgba(0, 20, 40, 0.7);
            padding: 15px;
            border: 1px solid #00ff88;
            border-radius: 4px;
            z-index: 10;
        }

        .legend-item {
            margin: 5px 0;
            display: flex;
            align-items: center;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            margin-right: 8px;
            border-radius: 50%;
        }

        .node-type-edge { background: #ff00ff; box-shadow: 0 0 8px #ff00ff; }
        .node-type-consumer { background: #00ffff; box-shadow: 0 0 8px #00ffff; }
        .node-type-pro { background: #ffff00; box-shadow: 0 0 8px #ffff00; }
        .node-type-server { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="stats">
        <div class="stat-line"><span class="label">Active Nodes:</span><span class="value pulse" id="nodeCount">0</span></div>
        <div class="stat-line"><span class="label">Tasks Processed:</span><span class="value" id="taskCount">0</span></div>
        <div class="stat-line"><span class="label">Network Latency:</span><span class="value" id="latency">~5ms</span></div>
        <div class="stat-line"><span class="label">Total Bandwidth:</span><span class="value" id="bandwidth">0 MB/s</span></div>
    </div>

    <div id="legend">
        <div class="legend-item"><div class="legend-color node-type-edge"></div>Edge (Phone)</div>
        <div class="legend-item"><div class="legend-color node-type-consumer"></div>Consumer (GPU)</div>
        <div class="legend-item"><div class="legend-color node-type-pro"></div>Professional (WS)</div>
        <div class="legend-item"><div class="legend-color node-type-server"></div>Server (DC)</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Node types with colors
        const nodeTypes = {
            edge: { color: '#ff00ff', label: 'Edge', radius: 8 },
            consumer: { color: '#00ffff', label: 'Consumer', radius: 10 },
            pro: { color: '#ffff00', label: 'Pro', radius: 11 },
            server: { color: '#00ff88', label: 'Server', radius: 12 }
        };

        // Create nodes
        class Node {
            constructor(x, y, type, index) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.index = index;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.radius = nodeTypes[type].radius;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.glow = 0;
                this.connections = [];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off walls
                if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {
                    this.vx *= -1;
                    this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                }
                if (this.y - this.radius < 0 || this.y + this.radius > canvas.height) {
                    this.vy *= -1;
                    this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
                }

                this.pulsePhase += 0.05;
                this.glow = Math.sin(this.pulsePhase) * 0.5 + 0.5;
            }

            draw() {
                const typeInfo = nodeTypes[this.type];
                const glowSize = this.glow * 10;

                // Glow effect
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius + glowSize);
                gradient.addColorStop(0, typeInfo.color + '40');
                gradient.addColorStop(1, typeInfo.color + '00');
                ctx.fillStyle = gradient;
                ctx.fillRect(this.x - this.radius - glowSize, this.y - this.radius - glowSize, 
                             (this.radius + glowSize) * 2, (this.radius + glowSize) * 2);

                // Core node
                ctx.fillStyle = typeInfo.color;
                ctx.shadowColor = typeInfo.color;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Node border
                ctx.strokeStyle = typeInfo.color;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // Data packet for animations
        class Packet {
            constructor(fromNode, toNode) {
                this.fromNode = fromNode;
                this.toNode = toNode;
                this.progress = 0;
                this.speed = 0.02 + Math.random() * 0.03;
                this.size = 2 + Math.random() * 2;
            }

            update() {
                this.progress += this.speed;
            }

            draw() {
                if (this.progress >= 1) return;

                const x = this.fromNode.x + (this.toNode.x - this.fromNode.x) * this.progress;
                const y = this.fromNode.y + (this.toNode.y - this.fromNode.y) * this.progress;

                ctx.fillStyle = '#00ff88';
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            isDone() {
                return this.progress >= 1;
            }
        }

        // Initialize nodes
        const nodes = [];
        const nodeTypeArray = ['edge', 'consumer', 'pro', 'server'];
        
        for (let i = 0; i < 12; i++) {
            const type = nodeTypeArray[i % 4];
            const angle = (i / 12) * Math.PI * 2;
            const radius = 150 + Math.random() * 150;
            const x = canvas.width / 2 + Math.cos(angle) * radius;
            const y = canvas.height / 2 + Math.sin(angle) * radius;
            nodes.push(new Node(x, y, type, i));
        }

        // Create initial connections
        let packets = [];

        function createRandomPackets() {
            if (Math.random() < 0.1 && packets.filter(p => !p.isDone()).length < 15) {
                const fromNode = nodes[Math.floor(Math.random() * nodes.length)];
                const toNode = nodes[Math.floor(Math.random() * nodes.length)];
                if (fromNode !== toNode) {
                    packets.push(new Packet(fromNode, toNode));
                }
            }
        }

        // Draw connections between nearby nodes
        function drawConnections() {
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[j].x - nodes[i].x;
                    const dy = nodes[j].y - nodes[i].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 300) {
                        const opacity = (1 - distance / 300) * 0.4;
                        ctx.strokeStyle = `rgba(0, 255, 136, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Update stats
        function updateStats() {
            document.getElementById('nodeCount').textContent = nodes.length;
            document.getElementById('taskCount').textContent = Math.floor(packets.length * 50 + Math.random() * 100);
            document.getElementById('latency').textContent = (Math.random() * 30 + 5).toFixed(1) + 'ms';
            document.getElementById('bandwidth').textContent = (Math.random() * 500 + 100).toFixed(0) + ' MB/s';
        }

        // Animation loop
        function animate() {
            // Clear canvas
            ctx.fillStyle = 'rgba(10, 14, 39, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw nodes
            for (const node of nodes) {
                node.update();
                node.draw();
            }

            // Draw connections
            drawConnections();

            // Create and animate packets
            createRandomPackets();
            packets = packets.filter(p => !p.isDone());
            for (const packet of packets) {
                packet.update();
                packet.draw();
            }

            // Update stats
            updateStats();

            requestAnimationFrame(animate);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        animate();
    </script>
</body>
</html>
