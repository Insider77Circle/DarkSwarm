<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0" stop-color="#0E0F1A"/>
      <stop offset="0.6" stop-color="#23243A"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0" stop-color="#7C4DFF"/>
      <stop offset="1" stop-color="#00D4FF"/>
    </linearGradient>
    <style>
      .title { font: 700 48px/1.1 'Inter', Arial, sans-serif; fill: url(#g2); }
      .subtitle { font: 300 20px 'Inter', Arial, sans-serif; fill: #9AA4B2; }
    </style>
  </defs>
  <rect width="1200" height="300" fill="url(#g1)"/>
  <g transform="translate(60,60)">
    <circle cx="40" cy="40" r="40" fill="url(#g2)" opacity="0.16"/>
    <circle cx="40" cy="40" r="24" fill="#0E0F1A"/>
    <g transform="translate(24,28)" fill="#7C4DFF">
      <rect x="0" y="0" width="4" height="16" rx="2"/>
      <rect x="8" y="0" width="4" height="16" rx="2" opacity="0.75"/>
      <rect x="16" y="0" width="4" height="16" rx="2" opacity="0.5"/>
    </g>
  </g>
  <text x="140" y="120" class="title">DarkSwarm</text>
  <text x="140" y="155" class="subtitle">Decentralized, peer-to-peer swarm for collective LLM inference</text>
</svg>
