<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="'Courier New', monospace" width="720" height="480">
  <defs>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes fade1 { 0%,10%{opacity:0} 15%,100%{opacity:1} }
      @keyframes fade2 { 0%,20%{opacity:0} 25%,100%{opacity:1} }
      @keyframes fade3 { 0%,30%{opacity:0} 35%,100%{opacity:1} }
      @keyframes fade4 { 0%,40%{opacity:0} 45%,100%{opacity:1} }
      @keyframes fade5 { 0%,50%{opacity:0} 55%,100%{opacity:1} }
      @keyframes fade6 { 0%,60%{opacity:0} 65%,100%{opacity:1} }
      @keyframes fade7 { 0%,70%{opacity:0} 75%,100%{opacity:1} }
      @keyframes fade8 { 0%,80%{opacity:0} 85%,100%{opacity:1} }
      @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
      @keyframes nodePulse { 0%,100%{r:3} 50%{r:5} }
      @keyframes conn { 0%,100%{opacity:0.3} 50%{opacity:0.8} }
      .l1 { animation: fade1 12s ease forwards; }
      .l2 { animation: fade2 12s ease forwards; }
      .l3 { animation: fade3 12s ease forwards; }
      .l4 { animation: fade4 12s ease forwards; }
      .l5 { animation: fade5 12s ease forwards; }
      .l6 { animation: fade6 12s ease forwards; }
      .l7 { animation: fade7 12s ease forwards; }
      .l8 { animation: fade8 12s ease forwards; }
      .cursor { animation: blink 1s step-end infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .node-a { animation: nodePulse 3s ease-in-out infinite; }
      .node-b { animation: nodePulse 3s ease-in-out infinite 0.5s; }
      .node-c { animation: nodePulse 3s ease-in-out infinite 1s; }
      .node-d { animation: nodePulse 3s ease-in-out infinite 1.5s; }
      .conn { animation: conn 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Terminal window frame -->
  <rect x="10" y="10" width="700" height="460" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <rect x="10" y="10" width="700" height="35" rx="8" fill="#2d2d44"/>
  <rect x="10" y="28" width="700" height="17" fill="#2d2d44"/>

  <!-- Window buttons -->
  <circle cx="32" cy="27" r="6" fill="#ff5555"/>
  <circle cx="52" cy="27" r="6" fill="#ffbd2e"/>
  <circle cx="72" cy="27" r="6" fill="#28c840"/>

  <!-- Window title -->
  <text x="360" y="32" text-anchor="middle" fill="#888" font-size="12" font-family="sans-serif">DarkSwarm Node — Terminal</text>

  <!-- Terminal output lines -->
  <text x="30" y="70" fill="#00ff00" font-size="13" class="l1">$ darkswarm start</text>

  <text x="30" y="95" fill="#00ff88" font-size="13" class="l2">[DarkSwarm] Initializing node...</text>
  <text x="30" y="115" fill="#888" font-size="13" class="l3">[DarkSwarm] Hardware detected:</text>
  <text x="50" y="135" fill="#aaa" font-size="13" class="l3">GPU: NVIDIA RTX 4090 (24GB VRAM)</text>
  <text x="50" y="155" fill="#aaa" font-size="13" class="l3">RAM: 32.0 GB</text>
  <text x="50" y="175" fill="#aaa" font-size="13" class="l3">Tier: Pro</text>

  <text x="30" y="200" fill="#00ff88" font-size="13" class="l4">[DarkSwarm] Scanning for models...</text>
  <text x="50" y="220" fill="#aaa" font-size="13" class="l4">• ollama:llama-3.1-8b (q4)</text>
  <text x="50" y="240" fill="#aaa" font-size="13" class="l4">• ollama:qwen2.5-32b (q4)</text>
  <text x="50" y="260" fill="#aaa" font-size="13" class="l4">• ollama:deepseek-coder-v2 (q4)</text>

  <text x="30" y="285" fill="#00ff88" font-size="13" class="l5">[DarkSwarm] Connecting to P2P swarm...</text>
  <text x="50" y="305" fill="#aaa" font-size="13" class="l5">• libp2p DHT — bootstrapping...</text>
  <text x="50" y="325" fill="#aaa" font-size="13" class="l5">• Found 14 peers in mesh</text>

  <!-- Mini P2P mesh visualization -->
  <g class="l6" transform="translate(480, 240)">
    <text x="-40" y="-60" fill="#666" font-size="11">P2P Mesh</text>
    <line x1="0" y1="0" x2="30" y2="-30" stroke="#0a0" stroke-width="1.5" class="conn"/>
    <line x1="0" y1="0" x2="60" y2="0" stroke="#0a0" stroke-width="1.5" class="conn"/>
    <line x1="0" y1="0" x2="30" y2="40" stroke="#0a0" stroke-width="1.5" class="conn"/>
    <line x1="0" y1="0" x2="-30" y2="-20" stroke="#0a0" stroke-width="1.5" class="conn"/>
    <line x1="0" y1="0" x2="-50" y2="20" stroke="#0a0" stroke-width="1.5" class="conn"/>
    <line x1="0" y1="0" x2="-20" y2="45" stroke="#0a0" stroke-width="1.5" class="conn"/>
    <line x1="0" y1="0" x2="50" y2="-15" stroke="#0a0" stroke-width="1.5" class="conn"/>
    <circle cx="0" cy="0" r="5" fill="#00ff44" class="node-a"/>
    <text x="-18" y="20" fill="#0a0" font-size="9">◀ YOU</text>
    <circle cx="30" cy="-30" r="3" fill="#0af" class="node-b"/>
    <circle cx="60" cy="0" r="3" fill="#0af" class="node-c"/>
    <circle cx="30" cy="40" r="3" fill="#0af" class="node-d"/>
    <circle cx="-30" cy="-20" r="3" fill="#0af"/>
    <circle cx="-50" cy="20" r="3" fill="#0af"/>
    <circle cx="-20" cy="45" r="3" fill="#0af"/>
    <circle cx="50" cy="-15" r="3" fill="#0af"/>
  </g>

  <text x="30" y="350" fill="#00ff88" font-size="13" class="l7">[DarkSwarm] Node ready. Serving on port 9001.</text>

  <text x="30" y="375" fill="#00ff44" font-size="13" class="l8">[DarkSwarm] Running adversarial probes...</text>
  <text x="50" y="395" fill="#ffaa00" font-size="13" class="l8">  prompt_injection → passed</text>
  <text x="50" y="415" fill="#ffaa00" font-size="13" class="l8">  jailbreak_attempt → passed</text>
  <text x="50" y="435" fill="#ffaa00" font-size="13" class="l8">  role_play_bypass  → passed</text>

  <!-- Blinking cursor -->
  <text x="30" y="460" fill="#00ff00" font-size="13" class="cursor">$ █</text>
</svg>